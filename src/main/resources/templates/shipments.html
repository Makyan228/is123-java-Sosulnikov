<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sklad System | Отгрузки</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('shipments')}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/header :: header('Отгрузки', 'Простые документы отгрузки товара')}"></div>

        <section class="content-card">
            <div class="section-header">
                <div>
                    <h2>Список отгрузок</h2>
                    <p>Документы типа OUT</p>
                </div>

                <a th:href="@{/shipments/new}" class="btn btn-primary">Создать отгрузку</a>
            </div>

            <div class="table-wrapper" th:if="${!#lists.isEmpty(shipments)}">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Номер</th>
                        <th>Дата</th>
                        <th>Склад</th>
                        <th>Куда отгружается</th>
                        <th>Статус</th>
                        <th>Примечание</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="shipment : ${shipments}">
                        <td th:text="${shipment.id}">1</td>
                        <td th:text="${shipment.docNumber}">OUT-001</td>
                        <td th:text="${shipment.docDate}">2026-04-13</td>
                        <td th:text="${shipment.warehouseName}">Склад</td>
                        <td th:text="${shipment.partnerName}">Магазин 1</td>
                        <td th:text="${shipment.docStatus}">DRAFT</td>
                        <td th:text="${shipment.notes}">Примечание</td>
                        <td>
                        <td>
                            <div class="table-actions">
                                <a th:href="@{/shipments/{id}/items(id=${shipment.id})}" class="btn btn-primary btn-small">
                                    Позиции
                                </a>

                                <a th:href="@{/shipments/{id}/edit(id=${shipment.id})}" class="btn btn-secondary btn-small">
                                    Редактировать
                                </a>

                                <form th:action="@{/shipments/{id}/delete(id=${shipment.id})}"
                                      method="post"
                                      onsubmit="return confirm('Удалить эту отгрузку вместе со всеми позициями?');">
                                    <button type="submit" class="btn btn-danger btn-small">Удалить</button>
                                </form>
                            </div>
                        </td>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-state" th:if="${#lists.isEmpty(shipments)}">
                <h3>Отгрузок пока нет</h3>
                <p>Создай первый документ отгрузки.</p>
                <a th:href="@{/shipments/new}" class="btn btn-primary">Создать отгрузку</a>
            </div>
        </section>
    </main>
</div>

</body>
</html>
