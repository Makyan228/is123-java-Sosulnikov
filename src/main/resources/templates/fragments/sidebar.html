<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<body>

<aside class="sidebar" th:fragment="sidebar(activePage)">
    <div class="sidebar-brand">
        <div class="brand-logo">SK</div>
        <div>
            <div class="brand-title">Sklad System</div>
            <div class="brand-subtitle">Учет склада</div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a th:href="@{/}"
           class="nav-link"
           th:classappend="${activePage == 'dashboard'} ? ' active' : ''">
            Главная
        </a>

        <a th:if="${canViewProducts}"
           th:href="@{/products}"
           class="nav-link"
           th:classappend="${activePage == 'products'} ? ' active' : ''">
            Товары
        </a>

        <a th:if="${canAccessReceipts}"
           th:href="@{/receipts}"
           class="nav-link"
           th:classappend="${activePage == 'receipts'} ? ' active' : ''">
            Поступления
        </a>

        <a th:if="${canAccessShipments}"
           th:href="@{/shipments}"
           class="nav-link"
           th:classappend="${activePage == 'shipments'} ? ' active' : ''">
            Отгрузки
        </a>

        <a th:if="${canAccessInventory}"
           th:href="@{/inventory}"
           class="nav-link"
           th:classappend="${activePage == 'inventory'} ? ' active' : ''">
            Остатки
        </a>
    </nav>
</aside>

</body>
</html>
