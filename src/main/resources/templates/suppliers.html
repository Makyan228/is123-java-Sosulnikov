<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sklad System | Поставщики</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="app-layout">
    <div th:replace="~{fragments/sidebar :: sidebar('suppliers')}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/header :: header('Поставщики', 'Справочник поставщиков из таблицы COUNTERPARTY')}"></div>

        <section class="content-card">
            <div class="section-header">
                <div>
                    <h2>Список поставщиков</h2>
                    <p>Показываются только записи с PARTY_TYPE = SUPPLIER</p>
                </div>

                <div class="header-actions">
                    <form th:action="@{/suppliers}" method="get" class="page-search">
                        <input type="text"
                               name="search"
                               th:value="${search}"
                               placeholder="Поиск по названию, телефону или email">
                        <button type="submit" class="btn btn-secondary">Искать</button>
                    </form>

                    <a th:href="@{/suppliers/new}" class="btn btn-primary">Добавить поставщика</a>
                </div>
            </div>

            <div class="table-wrapper" th:if="${!#lists.isEmpty(suppliers)}">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Название</th>
                        <th>Телефон</th>
                        <th>Email</th>
                        <th>Адрес</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="supplier : ${suppliers}">
                        <td th:text="${supplier.id}">1</td>
                        <td th:text="${supplier.name}">Поставщик</td>
                        <td th:text="${supplier.phone}">+7...</td>
                        <td th:text="${supplier.email}">mail@test.com</td>
                        <td th:text="${supplier.address}">Адрес</td>
                        <td>
                            <div class="table-actions">
                                <a th:href="@{/suppliers/{id}/edit(id=${supplier.id})}" class="btn btn-secondary btn-small">
                                    Редактировать
                                </a>

                                <form th:action="@{/suppliers/{id}/delete(id=${supplier.id})}"
                                      method="post"
                                      onsubmit="return confirm('Скрыть этого поставщика из списка?');">
                                    <button type="submit" class="btn btn-danger btn-small">Удалить</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="empty-state" th:if="${#lists.isEmpty(suppliers)}">
                <h3>Поставщиков пока нет</h3>
                <p>Добавь первую запись, чтобы справочник начал заполняться.</p>
                <a th:href="@{/suppliers/new}" class="btn btn-primary">Добавить поставщика</a>
            </div>
        </section>
    </main>
</div>

</body>
</html>
